name: Unit Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  testbox:
    runs-on: ubuntu-latest
    container:
      image: markdrew/lucli:snapshot
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix workspace permissions
        run: chmod -R a+rX .

      - name: Install CommandBox
        run: |
          apt-get update
          apt-get install -y curl gpg apt-transport-https ca-certificates
          curl -fsSL https://downloads.ortussolutions.com/debs/gpg | gpg --dearmor > /usr/share/keyrings/ortussolutions.gpg
          echo "deb [signed-by=/usr/share/keyrings/ortussolutions.gpg] https://downloads.ortussolutions.com/debs/noarch /" > /etc/apt/sources.list.d/commandbox.list
          apt-get update
          apt-get install -y commandbox
          box version

      - name: Install dependencies
        run: lucli install

      - name: Start server
        run: lucli server start --disable-open-browser

      - name: Run TestBox suite
        run: |
          set -eu
          ls .
          pwd
          ready=0
          i=0
          while [ "$i" -lt 60 ]; do
            HTTP_CODE=$(curl -sS -o test-results.json -w "%{http_code}" "http://127.0.0.1:8001/tests/index.cfm?reporter=json" || true)
            echo "[attempt $i] HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" = "200" ]; then
              ready=1
              break
            fi
            head -c 500 test-results.json 2>/dev/null || true
            echo ""
            i=$((i + 1))
            sleep 2
          done

          if [ "$ready" -ne 1 ]; then
            echo "Timed out waiting for test runner endpoint"
            echo "=== Last response body ==="
            cat test-results.json 2>/dev/null || true
            exit 1
          fi

          FAILS=$(grep -oE '"totalFail"[[:space:]]*:[[:space:]]*[0-9]+' test-results.json | grep -oE '[0-9]+' || true)
          ERRORS=$(grep -oE '"totalError"[[:space:]]*:[[:space:]]*[0-9]+' test-results.json | grep -oE '[0-9]+' || true)

          if [ -z "${FAILS:-}" ] || [ -z "${ERRORS:-}" ]; then
            echo "Could not parse totalFail/totalError from TestBox JSON output"
            cat test-results.json
            exit 1
          fi

          if [ "$FAILS" -gt 0 ] || [ "$ERRORS" -gt 0 ]; then
            echo "TestBox failures detected (failures=$FAILS, errors=$ERRORS)"
            exit 1
          fi

          echo "TestBox passed (failures=$FAILS, errors=$ERRORS)"

      - name: Stop server
        if: always()
        run: lucli server stop >/dev/null 2>&1 || true
