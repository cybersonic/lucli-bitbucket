name: Unit Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  checks: write
  contents: read

jobs:
  testbox:
    runs-on: ubuntu-latest
    container:
      image: markdrew/lucli:snapshot
      options: --user root
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fix workspace permissions
        run: chmod -R a+rX .

      - name: Install CommandBox
        run: |
          apt-get update
          apt-get install -y curl gpg apt-transport-https ca-certificates
          curl -fsSL https://downloads.ortussolutions.com/debs/gpg | gpg --dearmor > /usr/share/keyrings/ortussolutions.gpg
          echo "deb [signed-by=/usr/share/keyrings/ortussolutions.gpg] https://downloads.ortussolutions.com/debs/noarch /" > /etc/apt/sources.list.d/commandbox.list
          apt-get update
          apt-get install -y commandbox
          box version

      - name: Install dependencies
        run: lucli install

      - name: Start server
        run: lucli server start --disable-open-browser

      - name: Run TestBox suite
        run: |
          set -eu

          ready=0
          i=0
          while [ "$i" -lt 60 ]; do
            if curl -fsS -o test-results.xml "http://127.0.0.1:8001/tests/index.cfm?reporter=JUnit"; then
              ready=1
              break
            fi
            i=$((i + 1))
            sleep 2
          done

          if [ "$ready" -ne 1 ]; then
            echo "Timed out waiting for test runner endpoint"
            exit 1
          fi

      - name: Stop server
        if: always()
        run: lucli server stop >/dev/null 2>&1 || true

      - name: Publish test results
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: test-results.xml
